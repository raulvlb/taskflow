name: Auto-update Docs via GitHub Models

on:
  pull_request:
    branches: [master]
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  update-docs:
    name: Analyze merged PR and update DOCUMENTATION.md
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: diff the last commit on master to capture recent changes
            git diff HEAD~1...HEAD \
              -- . ':(exclude)DOCUMENTATION.md' \
              | head -c 8000 > /tmp/pr_diff.txt
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Manual run — using last commit as diff."
          else
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            git diff "$BASE"..."$HEAD" \
              -- . ':(exclude)DOCUMENTATION.md' \
              | head -c 8000 > /tmp/pr_diff.txt
            if [ -s /tmp/pr_diff.txt ]; then
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
              echo "Code changes found — proceeding with doc update."
            else
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "No code changes — skipping doc update."
            fi
          fi

      - name: Update documentation via GitHub Models
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIFF_FILE: /tmp/pr_diff.txt
        run: python3 .github/scripts/update_docs.py

      - name: Commit updated documentation to master
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DOCUMENTATION.md
          if git diff --staged --quiet; then
            echo "Documentation already up to date — nothing to commit."
          else
            git commit -m "docs: auto-update DOCUMENTATION.md via GitHub Models [skip ci]"
            git push origin master
          fi
