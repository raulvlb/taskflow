name: Auto-update Docs via Copilot

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-docs:
    name: Analyze PR and update DOCUMENTATION.md
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Get code diff (excluding DOCUMENTATION.md)
        id: diff
        run: |
          git fetch origin master --depth=100
          git diff origin/master...HEAD \
            -- . ':(exclude)DOCUMENTATION.md' \
            | head -c 8000 > /tmp/pr_diff.txt

          if [ -s /tmp/pr_diff.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Code changes found — proceeding with doc update."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No code changes detected — skipping doc update."
          fi

      - name: Update documentation via GitHub Copilot
        if: steps.diff.outputs.has_changes == 'true'
        env:
          COPILOT_TOKEN: ${{ secrets.COPILOT_TOKEN }}
          DIFF_FILE: /tmp/pr_diff.txt
        run: python3 .github/scripts/update_docs.py

      - name: Commit updated documentation
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DOCUMENTATION.md
          if git diff --staged --quiet; then
            echo "Documentation already up to date — nothing to commit."
          else
            git commit -m "docs: auto-update DOCUMENTATION.md via GitHub Copilot [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi
