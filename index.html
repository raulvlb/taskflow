<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Gerenciador de Tarefas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>TaskFlow</h1>
      <p class="subtitle">Organize suas tarefas com eficiência</p>
    </header>

    <main class="main">
      <form class="task-form" id="taskForm">
        <input
          type="text"
          id="taskInput"
          class="task-input"
          placeholder="Nova tarefa..."
          maxlength="120"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn btn-add">Adicionar</button>
      </form>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="active">Pendentes</button>
        <button class="filter-btn" data-filter="completed">Concluídas</button>
      </div>

      <ul class="task-list" id="taskList"></ul>

      <footer class="task-footer" id="taskFooter">
        <span id="taskCount"></span>
        <button class="btn btn-clear" id="clearCompleted">Limpar concluídas</button>
      </footer>
    </main>
  </div>

  <div class="modal-overlay hidden" id="editModal">
    <div class="modal">
      <h2>Editar tarefa</h2>
      <input type="text" id="editInput" class="task-input" maxlength="120" />
      <div class="modal-actions">
        <button class="btn btn-cancel" id="cancelEdit">Cancelar</button>
        <button class="btn btn-save" id="saveEdit">Salvar</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
